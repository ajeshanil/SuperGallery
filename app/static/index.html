<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SuperGallery</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ─── Top bar ──────────────────────────────────────────────────── -->
<header id="topbar">
  <button class="icon-btn" id="menu-btn" aria-label="Menu" title="Menu">
    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>
  <span class="logo">SuperGallery</span>

  <div id="search-wrapper">
    <svg class="search-icon" viewBox="0 0 24 24">
      <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5a6.5 6.5 0 1 0-6.5 6.5c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>
    <input id="search-input" type="search" placeholder="Search people, objects, scenes…" autocomplete="off">
    <button id="search-clear" class="icon-btn" hidden>
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>

  <div class="header-actions">
    <button class="action-btn" id="import-btn">Import</button>
    <button class="action-btn accent" id="analyze-btn">Analyse</button>
  </div>
</header>

<!-- ─── Progress bar ─────────────────────────────────────────────── -->
<div id="progress-bar-wrap" hidden>
  <div id="progress-track">
    <div id="progress-fill"></div>
  </div>
  <div id="progress-info">
    <span id="progress-op"></span>
    <span id="progress-file"></span>
    <span id="progress-counts"></span>
  </div>
</div>

<!-- ─── Layout ───────────────────────────────────────────────────── -->
<div id="layout">

  <!-- Left sidebar -->
  <nav id="sidebar">
    <button class="nav-btn active" data-view="gallery">
      <svg viewBox="0 0 24 24"><path d="M22 16V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4zM2 6v14a2 2 0 0 0 2 2h14v-2H4V6H2z"/></svg>
      All Photos
    </button>
    <button class="nav-btn" data-view="people">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      People
    </button>
    <button class="nav-btn" data-view="map">
      <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
      Map
    </button>
    <button class="nav-btn" data-view="albums">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 16V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2zm-11-4 2.03 2.71L16 11l4 5H8l3-4zM2 6v14a2 2 0 0 0 2 2h14v-2H4V6H2z"/></svg>
      Albums
    </button>

    <div class="sidebar-sep"></div>

    <button class="nav-btn" id="run-quality-tags-btn" title="Backfill quality tags on all photos">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      Quality Tags
    </button>
    <button class="nav-btn danger-btn" id="reset-analysis-btn" title="Re-run AI analysis from scratch">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      Reset Analysis
    </button>
    <button class="nav-btn danger-btn" id="reset-all-btn" title="Delete all photos and data">
      <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      Reset All
    </button>
  </nav>

  <!-- Main content -->
  <main id="main">

    <!-- ── Gallery view ── -->
    <div id="view-gallery" class="view active">

      <!-- Person detail header -->
      <div id="person-header" hidden>
        <button class="back-btn" id="back-to-people">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          People
        </button>
        <div class="person-header-info">
          <span id="ph-name"></span>
          <span id="ph-count"></span>
        </div>
        <div id="ph-chips"></div>
      </div>

      <!-- Filter chips bar -->
      <div id="filter-chips-bar">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="favorites">
          <svg viewBox="0 0 24 24" width="12" height="12" style="vertical-align:-1px"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          Favorites
        </button>
      </div>

      <!-- Tag browser: category tabs + chips for filtering -->
      <div id="tag-browser">
        <div id="tag-browser-header">
          <div id="tag-cat-tabs"></div>
          <button id="tag-clear-btn" hidden>✕ Clear filters</button>
        </div>
        <div id="tag-chips-row"></div>
      </div>

      <!-- Controls bar -->
      <div id="gallery-controls">
        <select id="sort-select">
          <option value="month_desc">Newest first</option>
          <option value="month_asc">Oldest first</option>
          <option value="year_desc">Year ↓</option>
          <option value="year_asc">Year ↑</option>
        </select>
        <div id="size-control" title="Thumbnail size">
          <svg viewBox="0 0 24 24" width="14" height="14"><path d="M21 15H3v2h18v-2zm0-4H3v2h18v-2zm0-4H3v2h18V7z"/></svg>
          <input type="range" id="tile-slider" min="80" max="300" value="160" step="10">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M21 15H3v2h18v-2zm0-4H3v2h18v-2zm0-4H3v2h18V7z"/></svg>
        </div>
        <span id="gallery-count"></span>
      </div>

      <!-- Photo grid -->
      <div id="photo-grid"></div>
      <div id="load-sentinel"></div>
    </div>

    <!-- ── People view ── -->
    <div id="view-people" class="view" hidden>
      <div id="people-header">
        <h2>People</h2>
        <button class="action-btn" id="cleanup-people-btn">Clean up</button>
      </div>
      <div id="people-tabs">
        <button class="people-tab active" data-tab="all">All People</button>
        <button class="people-tab" data-tab="similar">Similar Faces</button>
      </div>
      <div id="people-grid"></div>
      <div id="similar-grid" hidden></div>
    </div>

    <!-- ── Map view ── -->
    <div id="view-map" class="view" hidden>
      <iframe id="map-frame" src="about:blank" title="Photo map"></iframe>
    </div>

    <!-- ── Albums view ─────────────────────────────────────────────────── -->
    <div id="view-albums" class="view" hidden>
      <div id="albums-header">
        <h2>Albums</h2>
        <div class="albums-actions">
          <button class="action-btn" id="generate-events-btn">Auto-group Events</button>
          <button class="action-btn" id="create-album-btn">+ New Album</button>
        </div>
      </div>
      <div id="albums-grid"></div>
    </div>

  </main>

  <!-- Right detail panel -->
  <aside id="detail-panel" hidden>
    <div id="detail-header">
      <button class="icon-btn" id="close-detail" aria-label="Close">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
      <button class="icon-btn" id="detail-prev" aria-label="Previous photo" title="Previous (←)">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <button class="icon-btn" id="detail-next" aria-label="Next photo" title="Next (→)">
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
      <span id="detail-filename"></span>
      <button class="icon-btn" id="detail-fav" aria-label="Favorite" title="Favorite (f)">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </button>
      <button id="bbox-toggle" hidden>Hide boxes</button>
      <button id="analyze-photo-btn" class="icon-btn" title="Re-analyse this photo">
        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>
    </div>

    <div id="detail-photo-wrap">
      <canvas id="photo-canvas"></canvas>
    </div>

    <div id="detail-meta"></div>
    <div id="detail-tags"></div>

    <div id="add-tag-row">
      <input id="new-tag-input" type="text" placeholder="Add tag…" autocomplete="off">
      <select id="new-tag-cat">
        <option>Objects</option><option>Scenes</option><option>People</option>
        <option>Location</option><option>Date</option><option>Camera</option>
        <option>PhotoType</option>
      </select>
      <button id="add-tag-btn">+</button>
    </div>
  </aside>

</div><!-- /layout -->

<!-- ─── Same / different bar ─────────────────────────────────────── -->
<div id="same-diff-bar" hidden>
  <div id="sd-faces">
    <img id="sd-face-a" class="sd-face" alt="">
    <img id="sd-face-b" class="sd-face" alt="">
  </div>
  <div id="sd-copy">
    <strong>Same or different person?</strong>
    <span id="sd-names"></span>
  </div>
  <div id="sd-actions">
    <button id="sd-same">Same person</button>
    <button id="sd-diff">Different</button>
    <button class="icon-btn" id="sd-dismiss" aria-label="Dismiss">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>
</div>

<!-- ─── Import dialog ─────────────────────────────────────────────── -->
<div id="import-dialog" hidden>
  <div class="dialog-overlay" id="import-overlay"></div>
  <div class="dialog-box">
    <h2>Import Folder</h2>
    <p>Enter the full path to the folder on this computer:</p>
    <input id="import-path" type="text" placeholder="C:\Users\you\Pictures">
    <label class="dialog-opt-label">
      <input id="import-random-chk" type="checkbox">
      Import a random sample only
    </label>
    <div id="import-random-wrap" hidden style="margin-top:6px">
      <input id="import-random-n" type="number" min="1" max="9999" value="30"
             placeholder="Number of photos" style="width:120px">
      <span style="font-size:12px;color:var(--text-muted);margin-left:8px">random photos</span>
    </div>
    <div class="dialog-actions">
      <button id="import-cancel" class="btn-ghost">Cancel</button>
      <button id="import-confirm" class="btn-accent">Import</button>
    </div>
  </div>
</div>

<!-- ─── Rename dialog ────────────────────────────────────────────── -->
<div id="rename-dialog" hidden>
  <div class="dialog-overlay" id="rename-overlay"></div>
  <div class="dialog-box">
    <h2>Rename Person</h2>
    <input id="rename-input" type="text" autocomplete="off">
    <div class="dialog-actions">
      <button id="rename-cancel" class="btn-ghost">Cancel</button>
      <button id="rename-confirm" class="btn-accent">Rename</button>
    </div>
  </div>
</div>

<!-- ─── Bottom nav (mobile) ──────────────────────────────────────── -->
<nav id="bottom-nav">
  <button class="bnav-btn active" data-view="gallery">
    <svg viewBox="0 0 24 24"><path d="M22 16V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4zM2 6v14a2 2 0 0 0 2 2h14v-2H4V6H2z"/></svg>
    <span>Photos</span>
  </button>
  <button class="bnav-btn" data-view="people">
    <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    <span>People</span>
  </button>
  <button class="bnav-btn" data-view="map">
    <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
    <span>Map</span>
  </button>
  <button class="bnav-btn" data-view="albums">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 16V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2zm-11-4 2.03 2.71L16 11l4 5H8l3-4zM2 6v14a2 2 0 0 0 2 2h14v-2H4V6H2z"/></svg>
    <span>Albums</span>
  </button>
</nav>

<!-- ─── Lightbox ──────────────────────────────────────────────────── -->
<div id="lightbox" hidden>
  <div id="lightbox-overlay"></div>
  <img id="lightbox-img" alt="" draggable="false">
  <button class="icon-btn" id="lightbox-close" aria-label="Close lightbox">
    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
  </button>
  <button class="icon-btn lightbox-nav" id="lightbox-prev" aria-label="Previous">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>
  <button class="icon-btn lightbox-nav" id="lightbox-next" aria-label="Next">
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>
</div>

  <!-- ─── New album dialog ────────────────────────────────────────────── -->
  <div id="album-dialog" hidden>
    <div class="dialog-overlay" id="album-overlay"></div>
    <div class="dialog-box">
      <h2>New Album</h2>
      <input id="album-name-input" type="text" placeholder="Album name…" autocomplete="off">
      <div class="dialog-actions">
        <button id="album-cancel" class="btn-ghost">Cancel</button>
        <button id="album-confirm" class="btn-accent">Create</button>
      </div>
    </div>
  </div>

  <!-- ─── Clean up people dialog ──────────────────────────────────────── -->
  <div id="cleanup-dialog" hidden>
    <div class="dialog-overlay" id="cleanup-overlay"></div>
    <div class="dialog-box" style="min-width:380px;max-width:560px">
      <h2>Clean up People</h2>
      <p style="font-size:13px;color:var(--text3);margin:0 0 8px">
        People appearing in fewer than
        <input id="cleanup-threshold" type="number" min="1" max="99" value="2"
               style="width:52px;display:inline-block;margin:0 4px;padding:2px 6px">
        photos. Uncheck any to keep.
      </p>
      <div id="cleanup-list" style="max-height:320px;overflow-y:auto;margin:8px 0;"></div>
      <div class="dialog-actions">
        <button id="cleanup-cancel" class="btn-ghost">Cancel</button>
        <button id="cleanup-confirm" class="btn-danger">Delete Selected</button>
      </div>
    </div>
  </div>

<script src="/static/app.js"></script>
</body>
</html>
